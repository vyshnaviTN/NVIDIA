apiVersion: v1
kind: Pod
metadata:
  name: my-pod
  labels:
    app: ml-service # label for selecting this pod
spec:
  containers:
  - name: pytorch-container
    image: presidency-headnode:9443/custom/sugandhimg:v2
    resources: # resource quota
      requests:
        cpu: "4" # CHANGED: reduced from "8" to "4" — lowers resource request so pods can be scheduled on the shared cluster without hitting insufficient CPU errors
        memory: "16Gi"
        nvidia.com/mig-1g.18gb: 1
      limits:
        cpu: "8" #limit kept at 8 so the pod can burst if resources are available
        memory: "16Gi"
        nvidia.com/mig-1g.18gb: 1
    command: ["/bin/bash", "-c", "while true; do sleep 3600; done"]